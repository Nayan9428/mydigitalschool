<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>મેથ્સ માસ્ટર - ધોરણ 3 થી 5</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #FF4081;
            --secondary-color: #0288D1;
            --accent-color: #FFC107;
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Comic Neue', cursive, sans-serif;
            touch-action: none;
        }

        /* --- 1. START SCREEN --- */
        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #87CEEB 0%, #B0E0E6 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            overflow: hidden;
        }

        .bg-balloon {
            position: absolute;
            bottom: -100px;
            border-radius: 50%;
            opacity: 0.6;
            animation: floatUp linear infinite;
            z-index: -1;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.6; }
            100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
        }

        .main-title {
            font-family: 'Fredoka One', cursive;
            font-size: 60px;
            color: white;
            text-shadow: 3px 3px 0px var(--secondary-color), 6px 6px 0px rgba(0,0,0,0.2);
            margin-bottom: 10px;
            text-align: center;
            animation: titleFloat 3s ease-in-out infinite alternate;
        }
        @keyframes titleFloat { from { transform: translateY(0); } to { transform: translateY(-10px); } }

        .sub-title {
            color: #fff; font-size: 20px; margin-bottom: 30px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3); font-weight: bold;
        }

        /* --- Input Styles --- */
        .input-container {
            position: relative;
            width: 280px;
            height: 340px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .name-balloon-wrapper {
            position: relative;
            width: 240px;
            height: 180px;
            animation: hover 2.5s ease-in-out infinite alternate;
        }
        @keyframes hover { from { transform: translateY(0); } to { transform: translateY(-15px); } }

        .name-balloon {
            width: 100%; height: 100%;
            background: radial-gradient(circle at 30% 30%, #FF5252, #C62828);
            border-radius: 80% 80% 80% 80% / 80% 80% 90% 90%;
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.3), 5px 15px 20px rgba(0,0,0,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .name-balloon::after {
            content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
            border-top: 15px solid #C62828; border-left: 8px solid transparent; border-right: 8px solid transparent;
        }

        #studentName {
            background: transparent; border: none; color: white;
            font-size: 24px; font-family: 'Comic Neue', cursive; font-weight: bold;
            text-align: center; width: 80%; outline: none;
        }
        #studentName::placeholder { color: rgba(255,255,255,0.7); }

        .school-cloud {
            background: #E1F5FE; padding: 15px; border-radius: 30px;
            border: 3px solid #4FC3F7; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-top: 30px; width: 100%;
        }
        #schoolName {
            border: none; background: transparent; text-align: center;
            font-size: 18px; width: 90%; outline: none; color: #0277BD; font-weight: bold;
        }

        .start-btn {
            background: var(--accent-color); color: #3E2723;
            border: none; padding: 12px 40px; font-size: 24px;
            border-radius: 50px; cursor: pointer; margin-top: 30px;
            box-shadow: 0 6px #FFA000, 0 10px 20px rgba(0,0,0,0.2);
            transition: 0.2s; font-family: 'Fredoka One', cursive;
        }
        .start-btn:active { box-shadow: 0 2px #FFA000; transform: translateY(4px); }

        /* --- GAME UI --- */
        #game-container { display: none; position: relative; width: 100vw; height: 100vh; background: linear-gradient(to bottom, #4FC3F7, #E1F5FE);}
        
        #question-box {
            position: absolute; 
            bottom: 20px;
            left: 20px; 
            font-size: 28px; 
            font-weight: bold;
            color: white; 
            background: #333; 
            padding: 10px 25px; 
            border-radius: 10px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3); 
            z-index: 10; 
            border: 2px solid white;
        }
        
        #info-panel { position: absolute; top: 20px; right: 20px; text-align: right; z-index: 10; }
        .info-tag {
            background: rgba(255, 255, 255, 0.9); padding: 5px 15px; margin-bottom: 5px;
            border-radius: 8px; font-weight: bold; color: #333; border: 2px solid #0288D1; display: inline-block;
        }
        
        #shooter {
            position: absolute; bottom: 20px; right: 20px; font-size: 60px; z-index: 5;
            transform: rotate(-45deg); filter: drop-shadow(2px 4px 6px black);
        }
        
        /* Common Balloon Style for Game and Celebration */
        .balloon {
            position: absolute; width: 80px; height: 95px;
            border-radius: 80% 80% 80% 80% / 80% 80% 90% 90%; display: flex; justify-content: center; align-items: center;
            font-size: 20px; font-weight: bold; color: white; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            user-select: none; background-color: var(--bg-color); 
            background-image: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.1) 50%, transparent 100%);
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.3), 5px 10px 15px rgba(0,0,0,0.2); z-index: 2;
        }
        /* Game specific balloon style */
        .game-balloon { bottom: -120px; cursor: pointer; }
        
        .balloon::after {
            content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%);
            border-left: 6px solid transparent; border-right: 6px solid transparent; border-bottom: 10px solid var(--bg-color);
        }
        .balloon::before {
            content: ''; position: absolute; bottom: -50px; left: 50%; transform: translateX(-50%);
            width: 1px; height: 45px; background: rgba(50, 50, 50, 0.6); z-index: -1;
        }
        
        .arrow {
            position: absolute; width: 50px; height: 4px; background: #222; z-index: 4; display: none;
            transform-origin: center left; border-radius: 2px;
        }
        .arrow::before {
            content: ''; position: absolute; right: -10px; top: -4px; border-top: 6px solid transparent;
            border-bottom: 6px solid transparent; border-left: 12px solid #222;
        }
        
        /* Winning Screen updated */
        #winning-screen {
            display: none; 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 50;
            justify-content: center; align-items: center;
        }

        #winning-message-box {
            background: white; padding: 40px; text-align: center; border-radius: 20px; border: 5px solid #FFD700;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.8);
            width: 80%; max-width: 450px;
            display: none; /* Initially hidden for animation */
            z-index: 60;
            animation: popIn 0.5s ease-out;
        }
        @keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }

        /* Celebration container sits behind message box */
        #celebration-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 55;
        }

        .shake { animation: shake 0.4s; }
        @keyframes shake { 0% { transform: translateX(0); } 25% { transform: translateX(-5px); } 50% { transform: translateX(5px); } 75% { transform: translateX(-5px); } 100% { transform: translateX(0); } }
    </style>
</head>
<body>

    <div id="start-screen">
        <div class="bg-balloon" style="left: 10%; background: #FFEB3B; width: 40px; height: 50px; animation-duration: 15s;"></div>
        <div class="bg-balloon" style="left: 30%; background: #FF4081; width: 60px; height: 75px; animation-duration: 12s; animation-delay: 2s;"></div>
        <div class="bg-balloon" style="left: 70%; background: #00B0FF; width: 50px; height: 60px; animation-duration: 18s; animation-delay: 5s;"></div>
        <div class="bg-balloon" style="left: 85%; background: #00E676; width: 45px; height: 55px; animation-duration: 14s; animation-delay: 1s;"></div>

        <h1 class="main-title">🚀 મેથ્સ માસ્ટર 🚀</h1>
        <p class="sub-title">ધોરણ 3 થી 5 (3 અંકના સરવાળા)</p>
        
        <div class="input-container">
            <div class="name-balloon-wrapper">
                <div class="name-balloon">
                    <input type="text" id="studentName" placeholder="તમારું નામ અહીં લખો..." required autocomplete="off">
                </div>
            </div>

            <div class="school-cloud">
                <input type="text" id="schoolName" placeholder="🏫 શાળાનું નામ" required autocomplete="off">
            </div>
        </div>
        
        <button class="start-btn" onclick="submitDetails()">રમત શરૂ કરો ▶</button>
    </div>

    <div id="game-container">
        <div id="info-panel">
            <div class="info-tag" id="display-name">બાળક</div><br>
            <div class="info-tag" id="display-school" style="font-size: 14px;">શાળા</div><br>
            <div class="info-tag" style="background: #FFEB3B; font-size: 22px; border-color: orange;">પોઈન્ટ્સ: <span id="score">0</span></div>
        </div>
        
        <div id="question-box">
            <span id="question-text">? + ? = ?</span>
        </div>

        <div id="arrow" class="arrow"></div>
        <div id="shooter">🏹</div>
    </div>

    <div id="winning-screen">
        <div id="celebration-container"></div>

        <div id="winning-message-box">
            <h1 style="font-size: 60px; margin: 0;">🎉</h1>
            <h2 style="color: #4CAF50; font-size: 32px; margin-top: 10px;">અદભૂત! <span id="winner-name"></span></h2>
            <p style="font-size: 20px;">તમે 300 પોઈન્ટ્સ સાથે જીતી ગયા!</p>
            <button class="start-btn" style="margin-top: 20px;" onclick="location.reload()">ફરીથી રમો</button>
        </div>
    </div>

<script>
    let playerName = "";
    let schoolName = "";
    let score = 0;
    let currentAnswer = 0;
    let gameInterval;
    let isGameRunning = false;
    let balloons = [];
    const balloonColors = ['#E53935', '#8E24AA', '#3949AB', '#039BE5', '#00897B', '#7CB342', '#FDD835', '#FB8C00', '#F4511E'];
    
    const startScreen = document.getElementById('start-screen');
    const gameContainer = document.getElementById('game-container');
    const questionText = document.getElementById('question-text');
    const scoreEl = document.getElementById('score');
    const shooter = document.getElementById('shooter');
    const arrow = document.getElementById('arrow');
    const winningScreen = document.getElementById('winning-screen');
    const winningMessageBox = document.getElementById('winning-message-box');
    const celebrationContainer = document.getElementById('celebration-container');

    function submitDetails() {
        const nameInput = document.getElementById('studentName').value;
        const schoolInput = document.getElementById('schoolName').value;
        if (nameInput.trim() === "" || schoolInput.trim() === "") {
            alert("કૃપા કરીને ફુગ્ગામાં તમારું નામ અને નીચે શાળાનું નામ લખો!");
            return;
        }
        playerName = nameInput;
        schoolName = schoolInput;
        document.getElementById('display-name').innerText = "ખેલાડી: " + playerName;
        document.getElementById('display-school').innerText = schoolName;
        document.getElementById('winner-name').innerText = playerName;
        startScreen.style.display = 'none';
        gameContainer.style.display = 'block';
        startGame();
    }

    function startGame() {
        score = 0; scoreEl.innerText = score; isGameRunning = true;
        generateQuestion();
        gameInterval = setInterval(spawnBalloon, 800); 
        requestAnimationFrame(updateGame);
    }

    function generateQuestion() {
        let num1 = Math.floor(Math.random() * 400) + 100;
        let num2 = Math.floor(Math.random() * 400) + 100;
        currentAnswer = num1 + num2;
        questionText.innerText = `${num1} + ${num2} = ?`;
    }

    function spawnBalloon() {
        if (!isGameRunning || balloons.length >= 3) return;
        const balloon = document.createElement('div');
        balloon.classList.add('balloon', 'game-balloon'); // Added game-balloon class
        const randomColor = balloonColors[Math.floor(Math.random() * balloonColors.length)];
        balloon.style.setProperty('--bg-color', randomColor);
        let leftPos = Math.random() * (window.innerWidth - 150); 
        balloon.style.left = leftPos + 'px';
        let balloonNum;
        if (Math.random() < 0.40) { balloonNum = currentAnswer; } else {
            do { let offset = Math.floor(Math.random() * 100) - 50; if(offset === 0) offset = 10; balloonNum = currentAnswer + offset;
            } while (balloonNum === currentAnswer || balloonNum <= 0);
        }
        balloon.innerText = balloonNum;
        balloon.onclick = function() { checkAnswer(balloon, balloonNum); };
        balloon.ontouchstart = function() { checkAnswer(balloon, balloonNum); };
        gameContainer.appendChild(balloon);
        balloons.push({ element: balloon, speed: Math.random() * 1.5 + 1.5 });
    }

    function checkAnswer(targetBalloon, number) {
        if(!isGameRunning) return;
        if (number === currentAnswer) { shootArrow(targetBalloon); } else {
            score -= 10; scoreEl.innerText = score; scoreEl.style.color = "red";
            setTimeout(() => scoreEl.style.color = "black", 500);
            targetBalloon.classList.add('shake'); setTimeout(() => targetBalloon.classList.remove('shake'), 400);
        }
    }

    function shootArrow(targetBalloon) {
        const shooterRect = shooter.getBoundingClientRect();
        const balloonRect = targetBalloon.getBoundingClientRect();
        arrow.style.display = 'block'; arrow.style.transition = 'none';
        arrow.style.left = (shooterRect.left) + 'px'; arrow.style.top = (shooterRect.top + 30) + 'px';
        const deltaX = balloonRect.left - shooterRect.left; const deltaY = balloonRect.top - shooterRect.top;
        const angle = Math.atan2(deltaY, deltaX) * (180 / Math.PI);
        arrow.style.transform = `rotate(${angle}deg)`;
        setTimeout(() => { arrow.style.transition = 'top 0.2s linear, left 0.2s linear'; arrow.style.left = (balloonRect.left + 20) + 'px'; arrow.style.top = (balloonRect.top + 40) + 'px'; }, 10);
        setTimeout(() => {
            arrow.style.display = 'none'; score += 10; scoreEl.innerText = score;
            popBalloonEffect(targetBalloon); // Use shared pop effect
            
            setTimeout(() => {
                if (score >= 300) { gameWin(); } else { generateQuestion(); }
            }, 100);
        }, 210);
    }

    // Shared pop effect for game and celebration balloons
    function popBalloonEffect(targetBalloon) {
        targetBalloon.innerText = "✨"; targetBalloon.style.transform = "scale(1.5)"; 
        targetBalloon.style.background = "transparent"; targetBalloon.style.boxShadow = "none"; 
        targetBalloon.style.setProperty('--bg-color', 'transparent');
        setTimeout(() => { targetBalloon.remove(); balloons = balloons.filter(b => b.element !== targetBalloon); }, 100);
    }

    function gameWin() {
        isGameRunning = false; clearInterval(gameInterval);
        balloons.forEach(b => b.element.remove()); balloons = [];
        
        winningScreen.style.display = 'flex'; // Show container
        document.body.style.background = "linear-gradient(to bottom, #FFF176, #FFAB91)";
        
        startCelebration(); // Start balloon popping animation
    }

    // New Function for Celebration Animation
    function startCelebration() {
        const balloonCount = 20;
        let poppedCount = 0;

        for (let i = 0; i < balloonCount; i++) {
            const balloon = document.createElement('div');
            balloon.classList.add('balloon');
            const randomColor = balloonColors[Math.floor(Math.random() * balloonColors.length)];
            balloon.style.setProperty('--bg-color', randomColor);
            
            // Random position on screen
            balloon.style.left = Math.random() * (window.innerWidth - 100) + 'px';
            balloon.style.top = Math.random() * (window.innerHeight - 150) + 'px';
            balloon.style.position = 'absolute';
            
            celebrationContainer.appendChild(balloon);

            // Random delay before popping each balloon
            setTimeout(() => {
                popBalloonEffect(balloon);
                poppedCount++;
                // Show message box after all balloons are popped
                if (poppedCount === balloonCount) {
                     setTimeout(() => {
                        winningMessageBox.style.display = 'block';
                     }, 500);
                }
            }, i * 150 + Math.random() * 500); // Staggered popping
        }
    }

    function updateGame() {
        if (!isGameRunning) return;
        for (let i = 0; i < balloons.length; i++) {
            let b = balloons[i];
            let newBottom = (parseFloat(b.element.style.bottom) || -120) + b.speed;
            b.element.style.bottom = newBottom + 'px';
            if (newBottom > window.innerHeight) { b.element.remove(); balloons.splice(i, 1); i--; }
        }
        requestAnimationFrame(updateGame);
    }
</script>

</body>
</html>
